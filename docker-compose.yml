services:
  backend:
    build: ./backend
    volumes:
      - ./backend/media:/app/media
      - ./backend/db.sqlite3:/app/db.sqlite3
      - static_volume:/app/staticfiles
    environment:
      - DEBUG=False
      - DJANGO_ALLOWED_HOSTS=localhost
      - SECRET_KEY=${SECRET_KEY}
      - BREVO_SMTP_USER=${BREVO_SMTP_USER}
      - BREVO_SMTP_KEY=${BREVO_SMTP_KEY}
    expose:
      - "8000"

  frontend:
    build: ./frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    volumes:
      - static_volume:/app/staticfiles
      - ./backend/media:/app/media

volumes:
  static_volume: