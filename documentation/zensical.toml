[project]
site_name = "MakeMenu"
site_url = "https://CRhernandez1.github.io/make-menu/"
site_description = "Documentación del proyecto MakeMenu: plataforma de carta digital y gestión de pedidos para hostelería."
site_author = "Cristian Reyes Hernández, Samuel Domingo Cruz Sánchez, Daniele Dettori"
extra_css = ["stylesheets/extra.css"]
copyright = """
Copyright &copy; 2026 MakeMenu S.L. — Todos los derechos reservados.
"""
nav = [
  {"MakeMenu" = [{"Overview" = "index.md"}]},
  { "¿Qué es MakeMenu?" = [
    { "Overview" = "make-menu/index.md" },
    { "Plan de Marketing" = "make-menu/marketing.md" },
    { "Normativa" = "make-menu/normativa.md" },
    { "Impacto ambiental" = "make-menu/impacto-ambiental.md" },
    { "Creadores" = "make-menu/creadores.md" },
  ]},
  { "Guía de usuario" = [
    { "Overview" = "user-guide/index.md" },
    { "Funcionalidades" = "user-guide/features.md" },
  ]},
  { "Documentación técnica" = [
    { "Overview" = "technical/index.md" },
    { "Backend" = "technical/backend.md" },
    { "Frontend" = "technical/frontend.md" },
    { "Despliegue" = "technical/deploy.md" },
  ]},
  { "Memoria académica" = [
    { "Objetivos" = "academic/objetivos.md" },
    { "Requisitos" = "academic/requisitos.md" },
    { "Casos de uso" = "academic/casos-uso.md" },
    { "Conclusiones y trabajo futuro" = "academic/conclusiones.md" },
  ]},
]

[project.theme]
language = "es"
logo = "assets/logo.svg"
features = [
    "announce.dismiss",
    "content.code.annotate",
    "content.code.copy",
    "content.code.select",
    "content.footnote.tooltips",
    "content.tabs.link",
    "content.tooltips",
    "navigation.footer",
    "navigation.indexes",
    "navigation.instant",
    "navigation.instant.prefetch",
    "navigation.path",
    "navigation.sections",
    "navigation.top",
    "navigation.tracking",
    "search.highlight",
]

[project.theme.icon]
logo = "lucide/book-marked"

[project.theme.font]
text = "Sora"
code = "Space Grotesk"

[[project.theme.palette]]
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

copyright = "Copyright &copy; 2026 MakeMenu S.L. — Todos los derechos reservados."